apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
spec:
  provider: azure
  secretObjects:                # 👈 THIS enables ENV usage
    - secretName: db-secret
      type: Opaque
      data:
        - objectName: PRIMARYDB
          key: PRIMARYDB
        - objectName: SECONDARYDB
          key: SECONDARYDB
        - objectName: DBUSER
          key: DBUSER
        - objectName: DBPASSWORD
          key: DBPASSWORD
        - objectName: DBNAME
          key: DBNAME

  parameters:
    keyvaultName: vishalkeyvault01
    tenantId: 0cb63bd2-5b7b-4fc4-9837-c269e48f1695
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    objects: |
      array:
        - |
          objectName: PRIMARYDB
          objectType: secret
        - |
          objectName: SECONDARYDB
          objectType: secret
        - |
          objectName: DBUSER
          objectType: secret
        - |
          objectName: DBPASSWORD
          objectType: secret
        - |
          objectName: DBNAME
          objectType: secret
