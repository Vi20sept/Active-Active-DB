#Working deployment with Azure Key vault

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-access360-linux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-access360-linux
  template:
    metadata:
      labels:
        app: my-access360-linux
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
        - name: logincontainer02
          image: activedbcontainer.azurecr.io/loginimage
          ports:
            # - containerPort: 443
            - containerPort: 5000
          env:
            - name: PRIMARYDB
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: PRIMARYDB
          
            - name: SECONDARYDB
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: SECONDARYDB
          
            - name: DBUSER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DBUSER
          
            - name: DBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DBPASSWORD
          
            - name: DBNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DBNAME


